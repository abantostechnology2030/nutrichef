# Nginx — nutrichef.solucionesctec.com
# Copiar a: /etc/nginx/sites-available/nutrichef.solucionesctec.com
# Activar:  sudo ln -s /etc/nginx/sites-available/nutrichef.solucionesctec.com /etc/nginx/sites-enabled/
# SSL:      sudo certbot --nginx -d nutrichef.solucionesctec.com --redirect
#
# NutriChefIA es UN solo proceso Express (puerto 4005) que sirve la API,
# el frontend estatico y los archivos subidos (/uploads). Nginx solo hace
# de reverse-proxy hacia ese puerto.

server {
    listen 80;
    listen [::]:80;
    server_name nutrichef.solucionesctec.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nutrichef.solucionesctec.com;

    # SSL — certbot completa estas lineas automaticamente
    # ssl_certificate     /etc/letsencrypt/live/nutrichef.solucionesctec.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nutrichef.solucionesctec.com/privkey.pem;

    # Todo (API + frontend + /uploads) lo sirve Express en el puerto 4005.
    location / {
        proxy_pass http://localhost:4005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # El escaner sube DOS imagenes en un mismo multipart (ingredientes + nombre),
        # 8MB cada una segun el limite de multer -> el cuerpo puede llegar a ~16MB.
        # Con los 12M que usa NutriIA (una sola imagen) nginx cortaria con 413 antes
        # de que multer pudiera responder. No bajar de 20M.
        client_max_body_size 20M;

        # La generacion del menu (21 platos) es una llamada larga a la IA: ~60s
        # medidos. El default de nginx (60s) queda al filo y produce 504 fantasma.
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
